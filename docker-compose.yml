version: '3.8'
services:
  mysql:
    image: mysql:8.0
    container_name: marketplace-mysql
    environment:
      MYSQL_ROOT_PASSWORD: RootPass123!
      MYSQL_DATABASE: marketplace_db
      MYSQL_USER: marketplace_user
      MYSQL_PASSWORD: MarketPass123!
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    networks:
      - marketplace-network
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: marketplace-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - marketplace-network
    restart: unless-stopped

  mongo:
    image: mongo:7
    container_name: marketplace-mongo
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: MongoAdmin123!
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    networks:
      - marketplace-network
    restart: unless-stopped

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.11.0
    container_name: marketplace-elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
    ports:
      - "9200:9200"
    volumes:
      - elasticsearch-data:/usr/share/elasticsearch/data
    networks:
      - marketplace-network
    restart: unless-stopped

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: marketplace-rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: marketplace
      RABBITMQ_DEFAULT_PASS: MarketQueue123!
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    networks:
      - marketplace-network
    restart: unless-stopped

  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: marketplace-phpmyadmin
    ports:
      - "8080:80"
    environment:
      PMA_HOST: mysql
      PMA_USER: root
      PMA_PASSWORD: RootPass123!
    depends_on:
      - mysql
    networks:
      - marketplace-network
    restart: unless-stopped

networks:
  marketplace-network:
    driver: bridge

volumes:
  mysql-data:
  redis-data:
  mongo-data:
  elasticsearch-data:
  rabbitmq-data:
